<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image URL Decoder</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 500px; }
        input[type="text"] { width: 85%; padding: 12px; margin-bottom: 15px; border: 2px solid #007bff; border-radius: 5px; font-size: 14px; }
        button { padding: 12px 25px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #imageContainer { margin-top: 25px; border: 1px dashed #ccc; padding: 10px; background: #fafafa; }
        #previewImg { max-width: 100%; max-height: 25px0px; display: none; margin: 10px auto; border-radius: 5px; }
        #result { margin-top: 25px; font-weight: bold; font-size: 22px; color: #28a745; background: #e8f5e9; padding: 10px; border-radius: 5px; display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Image URL Decoder Box</h2>
    <p>Image ka link niche bakshe me daalein aur OK karein:</p>
    
    <input type="text" id="imageUrlInput" placeholder="Yahan image ka URL paste karein...">
    <br>
    <button onclick="decodeImageFromUrl()">OK / Decode Karo</button>

    <div id="imageContainer">
        <strong>Image Preview:</strong><br>
        <img id="previewImg" src="" alt="Image Preview">
    </div>

    <div id="result"></div>
</div>

<script>
    async function decodeImageFromUrl() {
        const url = document.getElementById('imageUrlInput').value.trim();
        const imgElement = document.getElementById('previewImg');
        const resultDiv = document.getElementById('result');

        if (!https://edistrict.up.gov.in/edistrict/showStatushome.aspx?application_no=261900010012280) {
            alert("Bhai, pehle koi valid image link toh daalo!");
            return;
        }

        // 1. Image ko screen par dikhana
        imgElement.src =https://edistrict.up.gov.in/edistrict/showStatushome.aspx?application_no=261900010012280;
        imgElement.style.display = 'block';
        resultDiv.style.display = 'block';
        resultDiv.style.color = '#ff9800';
        resultDiv.innerText = "Decoding chal rahi hai... thoda intezar karein...";

        // Browser security (CORS) ke liye anonymous mode allow karna
        imgElement.crossOrigin = "Anonymous"; 

        imgElement.onload = function() {
            // 2. Image load hote hi Tesseract AI se decode karna
            Tesseract.recognize(
                url,
                'eng',
                { logger: m => console.log(m) }
            ).then(({ data: { text } }) => {
                if (!text || text.trim() === "") {
                    resultDiv.style.color = '#dc3545';
                    resultDiv.innerText = "Output: Kuch nahi mila! Image saaf nahi hai ya sirf numbers readable nahi hain.";
                } else {
                    resultDiv.style.color = '#28a745';
                    resultDiv.innerText = "Decoded Output:\n" + text.trim();
                }
            }).catch(error => {
                console.error(error);
                resultDiv.style.color = '#dc3545';
                resultDiv.innerText = "Error: Website security (CORS) ki wajah se is link ki image decode nahi ho payi. Kisi dusre server ka link try karein.";
            });
        };

        imgElement.onerror = function() {
            resultDiv.style.color = '#dc3545';
            resultDiv.innerText = "Error: Image load nahi ho saki! Link kharab hai ya sahi nahi hai.";
            imgElement.style.display = 'none';
        };
    }
</script>

</body>
</html>
